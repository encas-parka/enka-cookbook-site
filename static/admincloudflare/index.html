<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Administration du Contenu</title>
  <style>
    #loading {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-family: Arial, sans-serif;
    }
    #logout-section {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 1000;
    }
    #logout-btn {
      padding: 8px 16px;
      background-color: #f8f9fa;
      border: 1px solid #dee2e6;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    #logout-btn:hover {
      background-color: #e9ecef;
    }
    .error {
      color: #dc3545;
      margin-top: 20px;
      padding: 10px;
      border: 1px solid #dc3545;
      border-radius: 4px;
      background-color: #f8d7da;
    }
  </style>
  </head>
<body>
  <!-- Écran de chargement -->
  <div id="loading">
    <h2>Chargement de l'administration...</h2>
    <p>Veuillez patienter<p>
    <div id="error-message" class="error" style="display: none;"></div>
  </div>

  <!-- Bouton de déconnexion -->
  <div id="logout-section" style="display: none;">
    <button id="logout-btn">Déconnexion </button>
  </div>

  <!-- Chargement de Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Configuration et backend personnalisé -->
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

    // Configuration selon l'environnement
    const isLocal = window.location.hostname === 'localhost';

    // Configuration Supabase (à adapter selon ton environnement)
    const SUPABASE_URL = "https://mkkrfozercivwnbmqfqe.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ra3Jmb3plcmNpdnduYm1xZnFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM5MTQ5MDIsImV4cCI6MjA2OTQ5MDkwMn0.E4uPMUe4JYR75IcCO8LkwC_ngoQkZwKowcLJP3lDqTQ";

    // URL du worker selon l'environnement
    const WORKER_URL = isLocal
      ? 'http://localhost:8787'
      : 'https://decap-cms-proxy.encas-cookbook.workers.dev';

    console.log('Configuration:', {
      isLocal,
      workerUrl: WORKER_URL,
      supabaseUrl: SUPABASE_URL
    });

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Backend personnalisé pour Decap CMS
    // Backend personnalisé pour Decap CMS
     class SupabaseBackend {
       constructor(config, options = {}) {
         this.config = config;
         this.options = options;
         this.proxyUrl = WORKER_URL;
         console.log('SupabaseBackend initialisé avec proxyUrl:', this.proxyUrl);
       }

       // Méthode obligatoire : authentification
       async authenticate() {
         console.log('Début de l\'authentification...');

         try {
           const { data: { session }, error: sessionError } = await supabase.auth.getSession();

           if (sessionError) {
             console.error('Erreur de session:', sessionError);
             throw sessionError;
           }

           if (!session) {
             console.log('Aucune session trouvée, redirection vers login...');
             window.location.href = '/login/';
             throw new Error('Not authenticated');
           }

           console.log('Session trouvée, vérification du token...');

           const response = await fetch(`${this.proxyUrl}/auth/verify`, {
             method: 'POST',
             headers: { 'Content-Type': 'application/json' },
             body: JSON.stringify({ token: session.access_token })
           });

           if (!response.ok) {
             const errorText = await response.text();
             console.error('Échec de la vérification du token:', response.status, errorText);
             throw new Error(`Token verification failed: ${response.status}`);
           }

           const userData = await response.json();
           console.log('Authentification réussie pour:', userData.user.email);

           return {
             name: userData.user.name || userData.user.email,
             login: userData.user.email,
             email: userData.user.email,
             token: session.access_token
           };
         } catch (error) {
           console.error('Erreur d\'authentification:', error);
           window.location.href = '/login/';
           throw error;
         }
       }

       // Méthodes obligatoires pour le fonctionnement de base
       authComponent() {
         // Retourne null pour utiliser le composant d'auth par défaut
         return null;
       }

       restoreUser(user) {
         // Tente de restaurer la session utilisateur
         console.log('restoreUser appelé avec:', user);
         return Promise.resolve(user);
       }

       // Méthodes requises par l'implémentation GitHub backend
       async request(path, options = {}) {
         const url = `${this.proxyUrl}${path}`;
         console.log('Requête proxy:', url);

         const response = await fetch(url, {
           ...options,
           headers: {
             ...options.headers,
             'Content-Type': 'application/json',
           }
         });

         if (!response.ok) {
           const errorText = await response.text();
           console.error('Échec de la requête proxy:', response.status, errorText);
           throw new Error(`Request failed: ${response.status} ${response.statusText}`);
         }

         return response;
       }

       // Implémentation des méthodes requises par Decap CMS
       async getEntry(path) {
         console.log('getEntry:', path);
         const response = await this.request(`/repos/${this.config.repo}/contents/${path}`, {
           method: 'GET'
         });
         return response.json();
       }

       async persistEntry(entry, options = {}) {
         console.log('persistEntry:', entry);
         const path = `content/${entry.collection}/${entry.slug}.md`;
         const content = this.serializeEntry(entry);

         const response = await this.request(`/repos/${this.config.repo}/contents/${path}`, {
           method: 'PUT',
           body: JSON.stringify({
             message: `Create/Update ${entry.title}`,
             content: btoa(unescape(encodeURIComponent(content))),
             branch: this.config.branch
           })
         });

         return response.json();
       }

       async deleteEntry(path, commitMessage) {
         console.log('deleteEntry:', path);
         const fileResponse = await this.request(`/repos/${this.config.repo}/contents/${path}`);
         const fileData = await fileResponse.json();

         const response = await this.request(`/repos/${this.config.repo}/contents/${path}`, {
           method: 'DELETE',
           body: JSON.stringify({
             message: commitMessage || `Delete ${path}`,
             sha: fileData.sha,
             branch: this.config.branch
           })
         });

         return response.json();
       }

       async getMedia() {
         console.log('getMedia appelé');
         // Implémentation basique pour les médias
         return [];
       }

       async persistMedia(file, options = {}) {
         console.log('persistMedia appelé avec:', file.name);
         // Implémentation basique pour les médias
         return { url: `/images/${file.name}` };
       }

       async deleteMedia(file) {
         console.log('deleteMedia appelé avec:', file);
         // Implémentation basique pour les médias
         return Promise.resolve();
       }

       async entriesByFolder(folder, extension, depth) {
         console.log('entriesByFolder:', folder, extension, depth);
         // Implémentation basique
         return [];
       }

       async entriesByFiles(files) {
         console.log('entriesByFiles:', files);
         // Implémentation basique
         return [];
       }

       async getMediaDisplayURL(displayURL) {
         console.log('getMediaDisplayURL:', displayURL);
         return displayURL;
       }

       serializeEntry(entry) {
         const frontMatter = Object.keys(entry.data)
           .map(key => `${key}: ${JSON.stringify(entry.data[key])}`)
           .join('\n');

         return `---\n${frontMatter}\n---\n\n${entry.content || ''}`;
       }
     }

    // Enregistrer le backend immédiatement quand le script est chargé
     if (window.CMS) {
       // Si CMS est déjà chargé, enregistrer maintenant
       window.CMS.registerBackend('supabase-proxy', SupabaseBackend);
       console.log('Backend enregistré immédiatement');
     } else {
       // Sinon, attendre que CMS soit disponible
       Object.defineProperty(window, 'CMS', {
         configurable: true,
         set: function(value) {
           // Quand CMS est défini, enregistrer le backend
           this._CMS = value;
           if (value && value.registerBackend) {
             value.registerBackend('supabase-proxy', SupabaseBackend);
             console.log('Backend enregistré via setter');
           }
         },
         get: function() {
           return this._CMS;
         }
       });
       console.log('Setter pour CMS configuré');
     }
    // Fonction pour afficher les erreurs
    function showError(message) {
      const errorDiv = document.getElementById('error-message');
      const loadingDiv = document.getElementById('loading');
      errorDiv.textContent = message;
      errorDiv.style.display = 'block';
      loadingDiv.style.display = 'block';
    }

    // Fonction pour masquer l'écran de chargement
    function hideLoading() {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('logout-section').style.display = 'block';
    }
    // Fonction pour vérifier si CMS est prêt
    function waitForCMS(maxAttempts = 50, interval = 100) {
      return new Promise((resolve, reject) => {
        let attempts = 0;

        function check() {
          attempts++;
          if (window.CMS && typeof window.CMS.registerBackend === 'function') {
            resolve();
          } else if (attempts >= maxAttempts) {
            reject(new Error('CMS non chargé après ' + maxAttempts + ' tentatives'));
          } else {
            setTimeout(check, interval);
          }
        }

        check();
      });
    }

    // Initialisation principale
    async function initializeCMS() {
        try {
          console.log('Début de l\'initialisation CMS...');

          // Attendre que CMS soit chargé
          await waitForCMS();
          console.log('Decap CMS est chargé et prêt');

          // Le backend est déjà enregistré, on initialise juste CMS
          window.CMS.init({
            config: {
              load_config_file: true // Utiliser le config.yml existant
            }
          });

          console.log('CMS initialisé avec succès');

          // Masquer l'écran de chargement après un court délai
          setTimeout(hideLoading, 1000);

        } catch (error) {
          console.error('Erreur lors de l\'initialisation CMS:', error);
          showError(`Erreur d'initialisation: ${error.message}`);
        }
      }

    // Démarrer l'initialisation quand le DOM est prêt
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeCMS);
    } else {
      initializeCMS();
    }

    // Écouter les changements d'état d'authentification
    supabase.auth.onAuthStateChange((event, session) => {
      console.log('Changement d\'état auth:', event, session ? 'session présente' : 'pas de session');
      if (event === 'SIGNED_OUT') {
        window.location.href = '/login/';
      }
    });

    // Gérer le bouton de déconnexion
    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        console.log('Clic sur déconnexion...');
        await supabase.auth.signOut();
        window.location.href = '/login/';
      } catch (error) {
        console.error('Erreur lors de la déconnexion:', error);
        showError('Erreur lors de la déconnexion');
      }
    });

  </script>
  </body>
  </html>
