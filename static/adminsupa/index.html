<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Administration du Contenu</title>
</head>
<body>
  <!-- Scripts à la fin du body -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script type="module">
    // Importe le client Supabase
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

    // --- CONFIGURATION ---
    const SUPABASE_URL = 'https://mkkrfozercivwnbmqfqe.supabase.co';
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1ra3Jmb3plcmNpdnduYm1xZnFlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTM5MTQ5MDIsImV4cCI6MjA2OTQ5MDkwMn0.E4uPMUe4JYR75IcCO8LkwC_ngoQkZwKowcLJP3lDqTQ";

    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const { h, createClass, ...CMS } = window.CMS;

    // --- CRÉATION DU BACKEND PERSONNALISÉ (LA MÉTHODE MODERNE) ---
    class SupabaseProxyBackend extends CMS.getBackend('proxy').default {
      constructor(config, options) {
        super(config, options);
        this.authComponent = () => h('div'); // Composant d'authentification vide, car gérée en externe
      }

      // Cette méthode est appelée avant chaque requête API
      async request(req) {
        const { data: { session } } = await supabase.auth.getSession();

        if (!session) {
          // Si pas de session, on ne fait rien et on laisse la requête échouer
          console.warn("Aucune session Supabase active. La requête ne sera pas authentifiée.");
          return super.request(req);
        }

        // On injecte le jeton d'authentification
        const newReq = req.clone({
          headers: {
            ...req.headers,
            Authorization: `Bearer ${session.access_token}`,
          },
        });

        return super.request(newReq);
      }
    }

    // --- ENREGISTREMENT DES WIDGETS ET LISTENERS PERSONNALISÉS ---
    // Widget UUID
    function nanoid(t = 8) { return crypto.getRandomValues(new Uint8Array(t)).reduce((t, e) => (t += (e &= 35) < 36 ? e.toString(36) : ""), "").toLowerCase(); }
    const UuidWidget = createClass({
        componentDidMount() { if (!this.props.value || window.location.href.endsWith("/new")) { this.props.onChange(nanoid()); } },
        render() { return h("span", { id: this.props.forID, style: { fontFamily: "monospace", marginLeft: "1rem" } }, this.props.value); },
    });
    CMS.registerWidget("uuid", UuidWidget);

    // Widget Text Info
    const TextInfoWidget = createClass({
        render: function () { return h("div", { className: this.props.classNameWrapper }, h("div", { style: { padding: "20px", backgroundColor: "#f0f0f0", borderRadius: "5px" } }, this.props.value)); },
    });
    CMS.registerWidget("text-info", TextInfoWidget);

    // Event Listener 'preSave'
    CMS.registerEventListener({
        name: "preSave",
        handler: ({ entry }) => {
            let updatedData = entry.get('data');
            // ... (votre logique de slugify et de tri reste identique) ...
            if (["recettes", "evenement"].includes(entry.get("collection"))) { if (!entry.getIn(["data", "titleslug"]) || window.location.href.endsWith("/new")) { const slugify = (str) => str.replace(/['']/g, "").toLowerCase().replace(/[^a-z0-9-]/g, (m) => "éèêëàäâùüûîïôöç".includes(m) ? m.normalize("NFD").replace(/[\u0300-\u036f]/g, "") : "-"); const title = entry.getIn(["data", "title"], ""); const uuid = entry.getIn(["data", "uuid"], ""); const slug = `${slugify(title)}_${uuid}`; updatedData = updatedData.set("titleslug", slug); } }
            if (entry.get("collection") === "evenement" && updatedData.has("repas") && updatedData.get("repas").size > 0) { let sortedRepas = updatedData.get("repas").sortBy(repas => new Date(repas.get("date_service"))).sortBy(repas => ({ "matin": 0, "midi": 1, "soir": 2 }[repas.get("horaire")])); sortedRepas = sortedRepas.map(repas => { if (repas.has("recettes_du_repas") && repas.get("recettes_du_repas").size > 0) { const sortedRecettes = repas.get("recettes_du_repas").sortBy(recette => ({ "entree": 0, "plat": 1, "dessert": 2 }[recette.get("type_plat")] || 3)); return repas.set("recettes_du_repas", sortedRecettes); } return repas; }); updatedData = updatedData.set("repas", sortedRepas); }
            return updatedData;
        },
    });

    // --- ENREGISTREMENT ET INITIALISATION ---
    CMS.registerBackend('proxy', SupabaseProxyBackend); // On enregistre notre backend personnalisé
    CMS.init(); // On initialise Decap CMS
  </script>
</body>
</html>
